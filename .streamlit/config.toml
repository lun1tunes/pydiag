browser.gatherUsageStats = false

[client]
# Hide developer menu actions (Clear cache / Rerun) so the bare "C"/"R"
# hotkeys cannot steal Ctrl+C / Ctrl+V clipboard shortcuts.
toolbarMode = "viewer"

[server]
headless = true
runOnSave = false


[theme]
base = "light"
primaryColor = "#0f766e"
backgroundColor = "#f6f7f9"
secondaryBackgroundColor = "#eef2f6"
textColor = "#111827"
font = "sans serif"
