name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          python scripts/venv_run.py -m pip install --upgrade pip
          python scripts/venv_run.py -m pip install -r requirements-dev.txt

      - name: Run quality gate
        run: python scripts/venv_run.py scripts/quality.py
