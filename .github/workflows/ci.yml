name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements-dev.txt

      - name: Validate bundled JSON
        run: .venv/bin/python scripts/validate_data.py

      - name: Compile Python
        run: .venv/bin/python -m py_compile app.py src/pydiag/*.py scripts/validate_data.py

      - name: Run tests with coverage
        run: .venv/bin/python -m pytest --cov=src/pydiag --cov-report=term-missing --cov-fail-under=85
